trigger:
  none

variables:
  # Docker Registry
  dockerRegistry: 'ashudevops'
  imageName: 'ashu290996/wonderlust'
  imageTag: '$(Build.BuildId)'
  
  # SonarQube
  sonarQubeServiceConnection: 'SonarQube'
  sonarProjectKey: 'wonderlust'
  
  # Kubernetes
  kubernetesServiceConnection: 'k8s-prod-connection'
  stagingNamespace: 'staging'
  productionNamespace: 'production'
  
  # Build
  #vmImageName: 'ubuntu-latest'
  
  # Security Thresholds
  trivySeverity: 'HIGH,CRITICAL'
  owaspFailOnCVSS: 7

pool:
 name: default

stages:
    - stage: Compile
      displayName: 'Compile of the code'
      jobs:
        - job: Installdependency
          displayName: 'Installdependency for the code'
          steps:
          - task: NodeTool@0
            inputs:
             versionSource: 'spec'
             versionSpec: '21.x'

          - script: npm install
            displayName: Installdependency backend
            workingDirectory: wanderlust-3tier-project/backend
            continueOnError: true

          - script: npm install
            displayName: Installdependency frontend
            workingDirectory: wanderlust-3tier-project/frontend




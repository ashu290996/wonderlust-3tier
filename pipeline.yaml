trigger:
  none

variables:
  # Docker Registry
  dockerRegistry: 'ashudevops'
  imageName1: 'ashu290996/wonderlustfrontend'
  imageName2: 'ashu290996/wonderlustbackened'
  imageTag: '$(Build.BuildId)'
  
  # SonarQube
  sonarQubeServiceConnection: 'sonarQube'
  sonarProjectKey: 'wonderlust'
  
  # Kubernetes
  kubernetesServiceConnection: 'k8s-prod-connection'
  stagingNamespace: 'staging'
  productionNamespace: 'production'
  
  # Build
  #vmImageName: 'ubuntu-latest'
  
  # Security Thresholds
  trivySeverity: 'HIGH,CRITICAL'
  owaspFailOnCVSS: 7

pool:
 name: default

stages:
    - stage: Compile
      displayName: 'Compile of the code'
      jobs:
        - job: Installdependency
          displayName: 'Installdependency for the code'
          steps:
          - task: NodeTool@0
            inputs:
             versionSource: 'spec'
             versionSpec: '21.x'

          - script: npm install
            displayName: Installdependency backend
            workingDirectory: wanderlust-3tier-project/backend
            continueOnError: true

          - script: npm install
            displayName: Installdependency frontend
            workingDirectory: wanderlust-3tier-project/frontend
      
    - stage: SonarQube
      displayName: 'SonarQube Analysis'
      jobs:
          - job: SonarQubeAnalysis
            steps: 

            - task: SonarQubePrepare@8
              displayName: 'Prepare SonarQube Analysis'
              inputs:
                SonarQube: '$(sonarQubeServiceConnection)'
                scannerMode: 'CLI'
                configMode: 'manual'
                cliProjectKey: 'blog-app'
                cliProjectName: 'blog-app'
                cliSources: 'wanderlust-3tier-project'
                  
            - task: SonarQubeAnalyze@8
              displayName: 'SonarQubeAnalyze'
              inputs:
                jdkversion: 'JAVA_HOME_21_X64'

            - task: SonarQubePublish@8
              displayName: 'SonarQubePublish'
              continueOnError: false
              inputs:
                pollingTimeoutSec: '300'
                
    - stage: OWASP
      jobs:
        - job: OWASP
          displayName: 'OWASP dependency checker'
          steps:

            - task: dependency-check-build-task@6
              continueOnError: true
              inputs:
                projectName: 'wonderlust-3tier'
                scanPath: 'wanderlust-3tier-project'
                format: 'HTML'
                uploadReports: true
                failOnCVSS: '7'

    - stage: Trivyscan
      jobs:
        - job: Trivyfilescan
          displayName: 'Trivyfilescan'
          steps:
            - script: trivy fs . --severity $(trivySeverity) --format table --output $(Build.ArtifactStagingDirectory)/trivy-fs-backend-report.txt
              workingDirectory: wanderlust-3tier-project/backend

            - script:  cat $(Build.ArtifactStagingDirectory)/trivy-fs-backend-report.txt
              workingDirectory: wanderlust-3tier-project/backend

            - script: trivy fs . --severity $(trivySeverity) --format table --output $(Build.ArtifactStagingDirectory)/trivy-fs-frontend-report.txt
              workingDirectory: wanderlust-3tier-project/frontend

            - script:  cat $(Build.ArtifactStagingDirectory)/trivy-fs-frontend-report.txt
              workingDirectory: wanderlust-3tier-project/frontend  

    - stage: DockerImage
      jobs:
        - job: DockerbuildfrontImage
          displayName: 'DockerbuildfrontImage'
          steps:

          - task: Docker@2
            inputs:
              containerRegistry: '$(dockerRegistry)'
              repository: '$(imageName1)'
              command: 'buildAndPush'
              Dockerfile: '**wanderlust-3tier-project/frontend/Dockerfile_optimized'
              tags: |
                $(imageTag)
                latest

        - job: DockerbuildbackenedImage
          displayName: 'DockerbuildbackenedImage'
          steps:
            - task: Docker@2
              inputs:
                containerRegistry: '$(dockerRegistry)'
                repository: '$(imageName2)'
                command: 'buildAndPush'
                Dockerfile: '**wanderlust-3tier-project/backend/Dockerfile_optimized'
                tags: |
                  $(imageTag)
                  latest
 # =====================================================
 # STAGE 7: TRIVY SCAN - DOCKER IMAGE
 # =====================================================
    - stage: Trivy_ImageScan
      displayName: 'Trivy Image Scan'
      #dependsOn: DockerBuild
      jobs:
        - job: TrivyImageScan
          displayName: 'Scan Docker frontend Image'
          steps:
          # - script: |
          #     # Install Trivy
          #     curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.48.0
          #   displayName: 'Install Trivy'

          - task: Docker@2
            displayName: 'Docker Login'
            inputs:
              containerRegistry: '$(dockerRegistry)'
              command: 'login'

          - script: |
              echo "=== Scanning Docker image for vulnerabilities ==="
              
              # Pull the image
              docker pull $(dockerRegistry)/$(imageName1):$(imageTag) || true
              
              # Table format for console
              trivy image $(dockerRegistry)/$(imageName1):$(imageTag) \
                --severity $(trivySeverity) \
                --format table \
                --output $(Build.ArtifactStagingDirectory)/trivy-image-report.txt
              
              # JSON format for parsing
              trivy image $(dockerRegistry)/$(imageName1):$(imageTag) \
                --severity $(trivySeverity) \
                --format json \
                --output $(Build.ArtifactStagingDirectory)/trivy-image-report.json
              
              # SARIF format for Azure DevOps Security tab
              trivy image $(dockerRegistry)/$(imageName1):$(imageTag) \
                --severity $(trivySeverity) \
                --format sarif \
                --output $(Build.ArtifactStagingDirectory)/trivy-image-report.sarif
              
              # HTML report
              trivy image $(dockerRegistry)/$(imageName1):$(imageTag) \
                --severity $(trivySeverity) \
                --format template \
                --template "@contrib/html.tpl" \
                --output $(Build.ArtifactStagingDirectory)/trivy-image-report.html || true
              
              # Display results
              cat $(Build.ArtifactStagingDirectory)/trivy-image-report.txt
              
              # Fail on critical vulnerabilities
              trivy image $(dockerRegistry)/$(imageName1):$(imageTag) \
                --severity CRITICAL \
                --exit-code 1 \
                --ignore-unfixed || {
                  echo "##vso[task.logissue type=error]CRITICAL vulnerabilities found in Docker image!"
                  exit 1
                }
            displayName: 'Trivy Image Scan'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Trivy Image Report'
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)'
              artifactName: 'trivy-image-report'
            condition: always()

        - job: TrivyImageScan2
          displayName: 'Scan Docker backened Image'
          steps:
              # - script: |
              #     # Install Trivy
              #     curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.48.0
              #   displayName: 'Install Trivy'

          - task: Docker@2
            displayName: 'Docker Login'
            inputs:
              containerRegistry: '$(dockerRegistry)'
              command: 'login'

          - script: |
                echo "=== Scanning Docker image for vulnerabilities ==="
                
                # Pull the image
                docker pull $(dockerRegistry)/$(imageName2):$(imageTag) || true

                trivy image $(dockerRegistry)/$(imageName2):$(imageTag) \
                  --severity $(trivySeverity) \
                  --format table \
                  --output $(Build.ArtifactStagingDirectory)/trivy-image-report.txt

                # JSON format for parsing
                trivy image $(dockerRegistry)/$(imageName2):$(imageTag) \
                  --severity $(trivySeverity) \
                  --format json \
                  --output $(Build.ArtifactStagingDirectory)/trivy-image-report.json
              
                # SARIF format for Azure DevOps Security tab
                trivy image $(dockerRegistry)/$(imageName2):$(imageTag) \
                  --severity $(trivySeverity) \
                  --format sarif \
                  --output $(Build.ArtifactStagingDirectory)/trivy-image-report.sarif
                
                # HTML report
                trivy image $(dockerRegistry)/$(imageName2):$(imageTag) \
                  --severity $(trivySeverity) \
                  --format template \
                  --template "@contrib/html.tpl" \
                  --output $(Build.ArtifactStagingDirectory)/trivy-image-report.html || true
                
                # Display results
                cat $(Build.ArtifactStagingDirectory)/trivy-image-report.txt
                
                # Fail on critical vulnerabilities
                trivy image $(dockerRegistry)/$(imageName2):$(imageTag) \
                  --severity CRITICAL \
                  --exit-code 1 \
                  --ignore-unfixed || {
                    echo "##vso[task.logissue type=error]CRITICAL vulnerabilities found in Docker image!"
                    exit 1
                  }
                displayName: 'Trivy Image Scan2'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Trivy Image Report2'
            inputs:
                pathToPublish: '$(Build.ArtifactStagingDirectory)'
                artifactName: 'trivy-image-report2'
            condition: always()

    - stage: dokcercompose
      displayName: 'dokcercompose deploy'
      jobs:
        - job: 
          displayName: 'dokcercompose deploy'
          steps:
            - script: | 
               docker compose pull
               docker compose up -d --remove-orphans
              workingDirectory: wanderlust-3tier-project



              

          




